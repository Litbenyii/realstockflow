services:
  postgres:
    image: postgres:15
    container_name: stockflow_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: stockflow_dev
    ports:
      - "5432:5432"
    volumes:
      - stockflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockflow_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stockflow_net

  backend:
    build: ./backend
    container_name: stockflow_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/stockflow_dev
      JWT_SECRET: stockflow_secret_2026
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stockflow_net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: stockflow_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - stockflow_net

volumes:
  stockflow_data:

networks:
  stockflow_net:
    driver: bridge
